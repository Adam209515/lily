<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday 7ayati</title>
    <style>
      :root {
        --bg1: #120815;
        --bg2: #2a1027;
        --accent: #ff78b2;
        --accent-soft: #ffd7ea;
        --text: #fff8fc;
        --muted: rgba(255, 255, 255, 0.82);
        --border: rgba(255, 255, 255, 0.16);
        --shadow: 0 20px 50px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        font-family: "Poppins", "Segoe UI", sans-serif;
        background: radial-gradient(
            circle at top,
            rgba(255, 120, 178, 0.18),
            transparent 30%
          ),
          linear-gradient(160deg, var(--bg1), var(--bg2));
        color: var(--text);
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        filter: blur(70px);
        opacity: 0.45;
        z-index: 0;
        pointer-events: none;
      }

      body::before {
        width: 240px;
        height: 240px;
        top: -60px;
        left: -40px;
        background: rgba(255, 119, 168, 0.32);
        animation: floatBlob 8s ease-in-out infinite;
      }

      body::after {
        width: 280px;
        height: 280px;
        bottom: -100px;
        right: -60px;
        background: rgba(255, 194, 220, 0.22);
        animation: floatBlob 10s ease-in-out infinite reverse;
      }

      .deck {
        position: relative;
        width: 100vw;
        height: 100vh;
        isolation: isolate;
      }

      .slide {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 28px;
        opacity: 0;
        transform: scale(0.97);
        transition: opacity 0.7s ease, transform 0.7s ease;
        pointer-events: none;
        z-index: 1;
      }

      .slide.active {
        opacity: 1;
        transform: scale(1);
        pointer-events: auto;
      }

      .hero-card,
      .photo-card,
      .final-slide {
        width: min(100%, 980px);
        position: relative;
        border-radius: 32px;
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .hero-card {
        min-height: min(78vh, 720px);
        display: grid;
        place-items: center;
        padding: 40px;
        text-align: center;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.12),
          rgba(255, 255, 255, 0.05)
        );
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .hero-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
            circle at 20% 20%,
            rgba(255, 255, 255, 0.16),
            transparent 35%
          ),
          radial-gradient(
            circle at 80% 30%,
            rgba(255, 120, 178, 0.25),
            transparent 28%
          ),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.06),
            rgba(255, 255, 255, 0.01)
          );
      }

      .hero-content {
        position: relative;
        z-index: 1;
        max-width: 800px;
      }

      .hero-title {
        margin: 0;
        font-size: clamp(2.2rem, 7vw, 5.6rem);
        line-height: 1.05;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        text-shadow: 0 8px 26px rgba(0, 0, 0, 0.28);
      }

      .photo-card {
        min-height: min(84vh, 760px);
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .image-wrap {
        position: relative;
        min-height: 100%;
        overflow: hidden;
        background: #0f0b11;
      }

      .image-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        -webkit-mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 68%,
          rgba(0, 0, 0, 0) 100%
        );
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 68%,
          rgba(0, 0, 0, 0) 100%
        );
      }

      .image-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
            to top,
            rgba(18, 8, 21, 0.92) 0%,
            rgba(18, 8, 21, 0.2) 32%,
            rgba(18, 8, 21, 0) 55%
          ),
          linear-gradient(to right, rgba(18, 8, 21, 0.06), rgba(18, 8, 21, 0));
        pointer-events: none;
      }

      .quote-box {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        gap: 22px;
        padding: 38px 36px;
        position: relative;
        z-index: 1;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0.03)
        );
      }

      .quote-tag {
        display: inline-flex;
        align-self: center;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 120, 178, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--accent-soft);
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .quote-text {
        margin: 0;
        font-size: clamp(1.5rem, 3.2vw, 3rem);
        line-height: 1.15;
        font-weight: 700;
        white-space: pre-line;
      }

      .final-slide {
        width: min(100%, 1100px);
        min-height: min(88vh, 820px);
        background: #000;
        display: grid;
        place-items: center;
      }

      .final-slide img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .final-slide::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(18, 8, 21, 0.72),
          rgba(18, 8, 21, 0.22) 45%,
          rgba(18, 8, 21, 0.38)
        );
        z-index: 1;
      }

      .final-quote {
        position: relative;
        z-index: 2;
        width: min(88%, 720px);
        text-align: center;
        padding: 24px;
      }

      .final-quote p {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 3.8rem);
        line-height: 1.15;
        font-weight: 700;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      }

      .controls {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(16, 10, 18, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .btn {
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font-size: 1.1rem;
        cursor: pointer;
      }

      .dots {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.25);
        transition: transform 0.25s ease, background 0.25s ease;
        cursor: pointer;
        border: none;
        padding: 0;
      }

      .dot.active {
        background: var(--accent);
        transform: scale(1.35);
      }

      .counter {
        min-width: 46px;
        text-align: center;
        font-size: 0.9rem;
        color: var(--muted);
      }

      @keyframes floatBlob {
        0%,
        100% {
          transform: translateY(0) translateX(0) scale(1);
        }
        50% {
          transform: translateY(-18px) translateX(10px) scale(1.05);
        }
      }

      @media (max-width: 900px) {
        .photo-card {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .image-wrap {
          min-height: 48vh;
        }

        .quote-box {
          padding: 26px 22px 30px;
        }

        .quote-text {
          font-size: clamp(1.4rem, 6vw, 2.25rem);
        }
      }

      @media (max-width: 600px) {
        .slide {
          padding: 14px;
        }

        .hero-card,
        .photo-card,
        .final-slide {
          border-radius: 24px;
        }

        .hero-card {
          min-height: 72vh;
          padding: 26px 18px;
        }

        .hero-title {
          font-size: clamp(2rem, 10vw, 3.5rem);
        }

        .image-wrap {
          min-height: 42vh;
        }

        .quote-tag {
          font-size: 0.68rem;
          letter-spacing: 0.14em;
        }

        .quote-box {
          gap: 16px;
        }

        .final-quote p {
          font-size: clamp(1.6rem, 7vw, 2.6rem);
        }

        .controls {
          bottom: 10px;
          gap: 10px;
          padding: 8px 10px;
        }

        .btn {
          width: 38px;
          height: 38px;
        }
      }
    </style>
  </head>
  <body>
    <main class="deck">
      <section class="slide active">
        <div class="hero-card">
          <div class="hero-content">
            <h1 class="hero-title">HAPPY BIRTHDAY<br />7AYATI 🖖😝</h1>
          </div>
        </div>
      </section>

      <section class="slide">
        <div class="photo-card">
          <div class="image-wrap">
            <img src="./1.jpg" alt="Birthday memory 1" />
          </div>
          <div class="quote-box">
            <span class="quote-tag">for my love</span>
            <p class="quote-text">loving you was a gift</p>
          </div>
        </div>
      </section>

      <section class="slide">
        <div class="photo-card">
          <div class="image-wrap">
            <img src="./2.jpg" alt="Birthday memory 2" />
          </div>
          <div class="quote-box">
            <span class="quote-tag">my favorite mystery</span>
            <p class="quote-text">you were mysterious without asking</p>
          </div>
        </div>
      </section>

      <section class="slide">
        <div class="photo-card">
          <div class="image-wrap">
            <img src="./3.jpg" alt="Birthday memory 3" />
          </div>
          <div class="quote-box">
            <span class="quote-tag">only yours</span>
            <p class="quote-text">mommy</p>
          </div>
        </div>
      </section>

      <section class="slide">
        <div class="photo-card">
          <div class="image-wrap">
            <img src="./4.jpg" alt="Birthday memory 4" />
          </div>
          <div class="quote-box">
            <span class="quote-tag">my sweet nickname</span>
            <p class="quote-text">my CHUBBY lily</p>
          </div>
        </div>
      </section>

      <section class="slide">
        <div class="photo-card">
          <div class="image-wrap">
            <img src="./5.jpg" alt="Birthday memory 5" />
          </div>
          <div class="quote-box">
            <span class="quote-tag">extra love</span>
            <p class="quote-text">i love uuu</p>
          </div>
        </div>
      </section>

      <section class="slide">
        <div class="photo-card">
          <div class="image-wrap">
            <img src="./6.jpg" alt="Birthday memory 6" />
          </div>
          <div class="quote-box">
            <span class="quote-tag">بكل الحب</span>
            <p class="quote-text">وحدي أنا مفتون من رأسي إلى قدماي</p>
          </div>
        </div>
      </section>

      <section class="slide">
        <div class="photo-card">
          <div class="image-wrap">
            <img src="./8.jpg" alt="Birthday memory 7" />
          </div>
          <div class="quote-box">
            <span class="quote-tag">ONLY YOURS</span>
            <p class="quote-text">mommy²</p>
          </div>
        </div>
      </section>

      <section class="slide">
        <div class="final-slide">
          <img src="./7.jpg" alt="Birthday memory 8" />
          <div class="final-quote">
            <p>Happy birthday 7ayati</p>
          </div>
        </div>
      </section>
    </main>

    <div class="controls">
      <button class="btn" id="prev" aria-label="Previous slide">
        &#10094;
      </button>
      <div class="dots" id="dots"></div>
      <span class="counter" id="counter"></span>
      <button class="btn" id="next" aria-label="Next slide">&#10095;</button>
    </div>

    <script>
      const slides = document.querySelectorAll(".slide");
      const dotsWrap = document.getElementById("dots");
      const counter = document.getElementById("counter");
      let current = 0;
      let touchStartX = 0;

      slides.forEach((_, index) => {
        const dot = document.createElement("button");
        dot.className = "dot" + (index === 0 ? " active" : "");
        dot.setAttribute("aria-label", "Go to slide " + (index + 1));
        dot.addEventListener("click", () => goTo(index));
        dotsWrap.appendChild(dot);
      });

      const dots = () => document.querySelectorAll(".dot");

      function updateSlides() {
        slides.forEach((slide, index) =>
          slide.classList.toggle("active", index === current)
        );
        dots().forEach((dot, index) =>
          dot.classList.toggle("active", index === current)
        );
        counter.textContent = current + 1 + "/" + slides.length;
      }

      function goTo(index) {
        current = (index + slides.length) % slides.length;
        updateSlides();
      }

      document
        .getElementById("prev")
        .addEventListener("click", () => goTo(current - 1));
      document
        .getElementById("next")
        .addEventListener("click", () => goTo(current + 1));

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") goTo(current + 1);
        if (e.key === "ArrowLeft") goTo(current - 1);
      });

      document.addEventListener(
        "touchstart",
        (e) => {
          touchStartX = e.changedTouches[0].clientX;
        },
        { passive: true }
      );

      document.addEventListener(
        "touchend",
        (e) => {
          const diff = touchStartX - e.changedTouches[0].clientX;
          if (Math.abs(diff) > 50) {
            goTo(diff > 0 ? current + 1 : current - 1);
          }
        },
        { passive: true }
      );

      updateSlides();
    </script>
  </body>
</html>
